<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gradebook Client</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Gradebook Client</h1>
      <p class="subtitle">Static frontend for the Gradebook API (GitHub Pages compatible).</p>

      <section class="card">
        <h2>Backend Settings</h2>
        <label>
          API Base URL
          <input id="apiBaseUrl" type="url" placeholder="https://your-api.example.com" />
        </label>
        <p class="hint">Saved in localStorage so you only set it once.</p>
      </section>

      <section class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <label>
            Email / User ID
            <input id="userId" required />
          </label>
          <label>
            Password
            <input id="password" type="password" required />
          </label>
          <label>
            School District
            <input id="schoolDistrict" placeholder="fortlee" required />
          </label>
          <button type="submit">Login</button>
        </form>
      </section>

      <section class="card">
        <h2>Session</h2>
        <div class="actions">
          <button id="loadAccountBtn">Load Account</button>
          <button id="loadGradesBtn">Load Grades</button>
          <button id="loadGpaBtn">Load GPA</button>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>
      </section>

      <section class="card">
        <h2>Response</h2>
        <pre id="output">No request made yet.</pre>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
